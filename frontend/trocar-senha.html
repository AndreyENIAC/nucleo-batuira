<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trocar senha — Núcleo Batuíra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-login d-flex align-items-center justify-content-center min-vh-100 p-3">
  <div class="card card-login shadow-lg">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h4 class="text-primary fw-bold">🔐 Crie sua nova senha</h4>
        <p class="text-muted small mb-0">
          No primeiro acesso, a senha temporária precisa ser substituída antes de entrar no sistema.
        </p>
      </div>

      <div id="mensagem-troca-senha" class="alert d-none"></div>

      <form id="form-trocar-senha">
        <div class="mb-3">
          <label for="senha-atual" class="form-label fw-semibold">Senha atual</label>
          <input type="password" id="senha-atual" class="form-control" required autocomplete="current-password">
        </div>
        <div class="mb-3">
          <label for="nova-senha" class="form-label fw-semibold">Nova senha</label>
          <input type="password" id="nova-senha" class="form-control" required minlength="8" autocomplete="new-password">
          <div class="form-text">Use pelo menos 8 caracteres, com letras e números.</div>
        </div>
        <div class="mb-4">
          <label for="confirmar-senha" class="form-label fw-semibold">Confirmar nova senha</label>
          <input type="password" id="confirmar-senha" class="form-control" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" id="btn-trocar-senha" class="btn btn-primary w-100 py-2 fw-semibold">
          Salvar nova senha
        </button>
      </form>

      <div class="text-center mt-3">
        <button type="button" id="btn-cancelar-sessao" class="btn btn-link btn-sm text-danger">Sair e voltar ao login</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/trocar-senha.js"></script>
</body>
</html>
