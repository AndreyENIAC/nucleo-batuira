<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acolhidos — Núcleo Batuíra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-cabecalho">
      <img src="https://nucleobatuira.org.br/wp-content/uploads/2021/07/LOGO-HDV-BATUIRA-1-768x324.png" alt="Núcleo Batuíra" class="logo-sidebar" onerror="this.style.display='none'">
      <div class="usuario-info"><p class="usuario-nome">Carregando...</p><span class="usuario-cargo">—</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="link-sidebar">📊 Dashboard</a>
      <a href="acolhidos.html" class="link-sidebar ativo" data-perfis="admin,technical,staff">👥 Acolhidos</a>
      <a href="financeiro.html" class="link-sidebar" data-perfis="admin,financial">💼 Gestão Financeira</a>
    </nav>
    <div class="sidebar-rodape"><a href="#" class="btn btn-danger w-100 btn-sm btn-logout">🚪 Sair</a></div>
  </aside>

  <main class="conteudo">
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div><h4 class="text-primary mb-1">👥 Acolhidos</h4><p id="quantidade-acolhidos" class="text-muted mb-0">Carregando...</p></div>
      <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#form-novo-acolhido">➕ Novo Acolhido</button>
    </div>
    <div id="mensagem-acolhidos" class="alert d-none"></div>

    <div class="collapse mb-4" id="form-novo-acolhido">
      <div class="card-nb p-4" style="background:#eff6ff;">
        <h6 class="mb-3">Cadastrar novo acolhido</h6>
        <form id="form-cadastro-acolhido">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Nome completo *</label><input id="acolhido-nome" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Data de nascimento *</label><input id="data-nascimento" type="date" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Data de admissão *</label><input id="data-admissao" type="date" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Modalidade *</label><select id="modalidade" class="form-select" required><option value="idoso">Pessoa idosa</option><option value="infantil">Infantil</option></select></div>
            <div class="col-md-3"><label class="form-label">Quarto</label><input id="quarto" class="form-control" placeholder="101-A"></div>
            <div class="col-md-3"><label class="form-label">Status</label><select id="status" class="form-select"><option value="estavel">Estável</option><option value="monitoramento">Em atenção</option><option value="critico">Crítico</option><option value="alta">Alta</option></select></div>
            <div class="col-md-3"><label class="form-label">Tipo</label><select id="tipo-atendimento" class="form-select"><option value="Convênio SUS">Convênio SUS</option><option value="Plano Privado">Plano Privado</option><option value="Particular">Particular</option></select></div>
            <div class="col-md-12"><label class="form-label">Condição principal</label><input id="condicao-principal" class="form-control" placeholder="Diagnóstico principal"></div>
          </div>
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-success">✓ Salvar</button>
            <button type="button" class="btn btn-secondary" data-bs-toggle="collapse" data-bs-target="#form-novo-acolhido">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="d-flex gap-2 mb-4 flex-wrap">
      <input id="busca-acolhido" class="form-control" style="max-width:280px" placeholder="🔍 Buscar por nome...">
      <select id="filtro-status" class="form-select" style="max-width:190px">
        <option value="">Todos os status</option><option value="estavel">Estável</option><option value="monitoramento">Em atenção</option><option value="critico">Crítico</option><option value="alta">Alta</option>
      </select>
    </div>

    <div class="card-nb tabela-scroll">
      <table class="tabela-nb">
        <thead><tr><th>Nome</th><th>Idade</th><th>Quarto</th><th>Condição</th><th>Tipo</th><th>Última consulta</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="corpo-acolhidos"><tr><td colspan="8" class="estado-carregando">Carregando...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script><script src="js/main.js"></script><script src="js/acolhidos.js"></script>
</body>
</html>
