<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — Núcleo Batuíra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-cabecalho">
      <img src="https://nucleobatuira.org.br/wp-content/uploads/2021/07/LOGO-HDV-BATUIRA-1-768x324.png" alt="Núcleo Batuíra" class="logo-sidebar" onerror="this.style.display='none'">
      <div class="usuario-info"><p class="usuario-nome">Carregando...</p><span class="usuario-cargo">—</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="link-sidebar">📊 Dashboard</a>
      <a href="agenda.html" class="link-sidebar ativo">📅 Agenda</a>
      <a href="acolhidos.html" class="link-sidebar" data-perfis="admin,technical,staff">🩺 Gestão de Saúde</a>
      <a href="financeiro.html" class="link-sidebar" data-perfis="admin,financial,staff">🏛️ Gestão Institucional</a>
      <a href="usuarios.html" class="link-sidebar" data-perfis="admin">🔐 Gerenciar Usuários</a>
    </nav>
    <div class="sidebar-rodape"><a href="#" class="btn btn-danger w-100 btn-sm btn-logout">🚪 Sair</a></div>
  </aside>

  <main class="conteudo">
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div>
        <h4 class="text-primary mb-1">📅 Agenda</h4>
        <p class="text-muted mb-0">Consultas, reuniões e eventos dos setores.</p>
      </div>
      <button id="btn-novo-evento" class="btn btn-primary" data-perfis="admin,technical,financial" data-bs-toggle="collapse" data-bs-target="#painel-evento">➕ Novo evento</button>
    </div>

    <div id="mensagem-agenda" class="alert d-none"></div>

    <section id="painel-evento" class="collapse mb-4" data-perfis="admin,technical,financial">
      <form id="form-evento" class="card-nb p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 id="titulo-form-evento" class="mb-0">Cadastrar evento</h6>
          <button id="btn-cancelar-edicao" type="button" class="btn btn-outline-secondary btn-sm d-none">Cancelar edição</button>
        </div>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Título *</label><input id="evento-titulo" class="form-control" required></div>
          <div class="col-md-3"><label class="form-label">Tipo *</label><input id="evento-tipo" class="form-control" placeholder="Consulta, reunião..." required></div>
          <div class="col-md-3"><label class="form-label">Setor *</label><select id="evento-setor" class="form-select" required></select></div>
          <div class="col-md-3"><label class="form-label">Início *</label><input id="evento-inicio" type="datetime-local" class="form-control" required></div>
          <div class="col-md-3"><label class="form-label">Término</label><input id="evento-fim" type="datetime-local" class="form-control"></div>
          <div class="col-md-3"><label class="form-label">Local</label><input id="evento-local" class="form-control"></div>
          <div class="col-md-3"><label class="form-label">Status</label><select id="evento-status" class="form-select"><option value="agendado">Agendado</option><option value="concluido">Concluído</option><option value="cancelado">Cancelado</option></select></div>
          <div class="col-md-6"><label class="form-label">Acolhido relacionado</label><select id="evento-acolhido" class="form-select"></select></div>
          <div class="col-md-6"><label class="form-label">Observações</label><input id="evento-observacoes" class="form-control"></div>
        </div>
        <button id="btn-salvar-evento" class="btn btn-success mt-3">Salvar evento</button>
      </form>
    </section>

    <section class="card-nb p-4 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-4"><label class="form-label">Filtrar setor</label><select id="filtro-setor" class="form-select"></select></div>
        <div class="col-md-4"><label class="form-label">Filtrar status</label><select id="filtro-status" class="form-select"><option value="agendado">Agendados</option><option value="">Todos</option><option value="concluido">Concluídos</option><option value="cancelado">Cancelados</option></select></div>
        <div class="col-md-4"><button id="btn-atualizar-agenda" class="btn btn-outline-primary w-100" type="button">Atualizar lista</button></div>
      </div>
    </section>

    <section class="card-nb tabela-scroll">
      <table class="tabela-nb">
        <thead><tr><th>Data e hora</th><th>Evento</th><th>Setor</th><th>Acolhido</th><th>Local</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="corpo-agenda-completa"><tr><td colspan="7" class="estado-carregando">Carregando...</td></tr></tbody>
      </table>
    </section>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/agenda.js"></script>
</body>
</html>
