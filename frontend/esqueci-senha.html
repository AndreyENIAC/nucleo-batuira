<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha — Núcleo Batuíra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-login d-flex align-items-center justify-content-center min-vh-100 p-3">
  <div class="card card-login shadow-lg">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h4 class="text-primary fw-bold">Esqueci minha senha</h4>
        <p class="text-muted small mb-0">
          Informe seu usuário ou e-mail. Um administrador poderá gerar uma senha temporária.
        </p>
      </div>

      <div id="mensagem-recuperacao" class="alert d-none"></div>

      <form id="form-esqueci-senha">
        <div class="mb-4">
          <label for="identificacao" class="form-label fw-semibold">Usuário ou e-mail</label>
          <input type="text" id="identificacao" class="form-control" required autocomplete="username">
        </div>
        <button type="submit" id="btn-solicitar" class="btn btn-primary w-100 py-2 fw-semibold">
          Solicitar recuperação
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="login.html" class="small">← Voltar ao login</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/esqueci-senha.js"></script>
</body>
</html>
