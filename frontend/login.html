<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Núcleo Batuíra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-login d-flex align-items-center justify-content-center min-vh-100 p-3">
  <div class="card card-login shadow-lg">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <img src="https://nucleobatuira.org.br/wp-content/uploads/2021/07/LOGO-HDV-BATUIRA-1-768x324.png"
             alt="Núcleo Batuíra" class="logo-login mb-3" onerror="this.style.display='none'">
        <h5 class="text-primary fw-bold">Sistema de Gestão de Cuidados</h5>
        <p class="text-muted small mb-0">Núcleo Batuíra · Guarulhos/SP</p>
      </div>

      <div id="mensagem-erro" class="alert alert-danger d-none py-2 text-center small"></div>

      <form id="form-login">
        <div class="mb-3">
          <label for="usuario" class="form-label fw-semibold">Usuário</label>
          <input type="text" id="usuario" class="form-control" required autocomplete="username">
        </div>
        <div class="mb-4">
          <label for="senha" class="form-label fw-semibold">Senha</label>
          <input type="password" id="senha" class="form-control" required autocomplete="current-password">
        </div>
        <button type="submit" id="btn-entrar" class="btn btn-primary w-100 py-2 fw-semibold">
          Entrar no Sistema
        </button>
      </form>

      <div class="mt-4 p-3 rounded small" style="background:#f8f9fa; border:1px solid #dee2e6;">
        <strong>Usuários para teste:</strong><br>
        admin / admin123<br>
        tecnico / senha123<br>
        financeiro / senha123<br>
        func / senha123
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
