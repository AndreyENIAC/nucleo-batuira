<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Batuíra - Troca de Senha</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffffff;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:#ffffff;
    color:#0f172a;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    border-bottom:3px solid #0284c7;
}

.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#f8fafc;
    width:450px;
    padding:35px;
    border-radius:15px;
    border:1px solid #dbeafe;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.box h2{
    text-align:center;
    color:#0f172a;
    margin-bottom:10px;
}

.aviso{
    text-align:center;
    color:#dc2626;
    font-weight:bold;
    margin-bottom:20px;
    padding:10px;
    background:#fee2e2;
    border-radius:8px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#0284c7;
}

button{
    width:100%;
    padding:12px;
    background:#0284c7;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0369a1;
}

footer{
    background:#ffffff;
    color:#0f172a;
    text-align:center;
    padding:12px;
    border-top:1px solid #dbeafe;
}
</style>
</head>

<body>

<header>
    Portal Batuíra
</header>

<div class="container">

    <div class="box">

        <h2>Troca de Senha Obrigatória</h2>

        <p class="aviso">
            Por segurança, altere sua senha antes de continuar.
        </p>

        <form>

            <input type="password" placeholder="Senha Atual" required>

            <input type="password" placeholder="Nova Senha" required>

            <input type="password" placeholder="Confirmar Nova Senha" required>

            <button type="submit">
                Alterar Senha
            </button>

        </form>

    </div>

</div>
                                                                                         
<footer>

</body>
</html>
