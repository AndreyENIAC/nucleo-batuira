<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Núcleo Batuíra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-login d-flex align-items-center justify-content-center min-vh-100 p-3">

  <div class="card card-login shadow-lg">
    <div class="card-body p-5">

      <!-- Logo e título -->
      <div class="text-center mb-4">
        <img src="https://nucleobatuira.org.br/wp-content/uploads/2021/07/LOGO-HDV-BATUIRA-1-768x324.png"
             alt="Núcleo Batuíra"
             class="logo-login mb-3"
             onerror="this.style.display='none'">
        <h5 class="text-primary fw-bold">Sistema de Gestão de Cuidados</h5>
        <p class="text-muted small mb-0">Núcleo Batuíra · Guarulhos/SP</p>
      </div>

      <!-- Mensagem de erro (oculta por padrão) -->
      <div id="mensagem-erro" class="alert alert-danger d-none py-2 text-center small" role="alert">
        Usuário ou senha incorretos. Tente novamente.
      </div>

      <!-- Formulário de login -->
      <form id="form-login">

        <div class="mb-3">
          <label for="usuario" class="form-label fw-semibold">Usuário</label>
          <input type="text"
                 id="usuario"
                 class="form-control"
                 placeholder="Digite seu usuário"
                 autocomplete="username"
                 required>
        </div>

        <div class="mb-4">
          <label for="senha" class="form-label fw-semibold">Senha</label>
          <input type="password"
                 id="senha"
                 class="form-control"
                 placeholder="Digite sua senha"
                 autocomplete="current-password"
                 required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold fs-6">
          🔐 Entrar no Sistema
        </button>

      </form>

      <!-- Credenciais de teste para apresentação -->
      <div class="mt-4 p-3 rounded" style="background:#f8f9fa; border:1px solid #dee2e6;">
        <p class="small fw-bold mb-2 text-dark">👤 Usuários para teste:</p>
        <table class="table table-sm table-borderless mb-0 small">
          <tbody>
            <tr>
              <td class="text-muted py-0">Admin</td>
              <td class="py-0"><code>admin / admin123</code></td>
            </tr>
            <tr>
              <td class="text-muted py-0">Técnico</td>
              <td class="py-0"><code>tecnico / senha123</code></td>
            </tr>
            <tr>
              <td class="text-muted py-0">Financeiro</td>
              <td class="py-0"><code>financeiro / senha123</code></td>
            </tr>
            <tr>
              <td class="text-muted py-0">Funcionário</td>
              <td class="py-0"><code>func / senha123</code></td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
