    /* ===== VARIÁVEIS E BASE ===== */
    :root {
      --nb-azul:       #1e40af;
      --nb-azul-claro: #3b82f6;
      --nb-azul-bg:    #eff6ff;
      --nb-borda:      #bfdbfe;
      --sidebar-w:     280px;
    }
    * { box-sizing: border-box; }
    body { background: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }

    /* ===== LAYOUT ===== */
    #layout-principal { display: flex; height: 100vh; overflow: hidden; }
    #sidebar-wrapper  { width: var(--sidebar-w); min-width: var(--sidebar-w); background: #fff;
                        border-right: 1px solid #e5e7eb; overflow-y: auto; flex-shrink: 0; }
    #conteudo-principal { flex: 1; overflow-y: auto; padding: 0; }

    /* ===== SIDEBAR ===== */
    .sidebar-logo   { max-width: 160px; height: auto; }
    .sidebar-usuario{ background: #fff; border: 1px solid var(--nb-borda); border-radius: 10px; padding: .75rem 1rem; }
    .nav-item-btn {
      display: block; width: 100%; text-align: left; background: transparent;
      border: none; border-radius: 10px; padding: .75rem 1rem; margin-bottom: .25rem;
      cursor: pointer; font-size: .95rem; color: #374151; transition: all .15s;
    }
    .nav-item-btn:hover { background: var(--nb-azul-bg); color: var(--nb-azul); }
    .nav-item-btn.ativo { background: var(--nb-azul-bg); color: var(--nb-azul); font-weight: 600;
                          border-left: 3px solid var(--nb-azul); }

    /* ===== CARDS ===== */
    .card-nb { background: #fff; border: 1px solid var(--nb-borda); border-radius: 14px;
               box-shadow: 0 1px 4px rgba(30,64,175,.06); }

    /* ===== TABS ===== */
    .nav-tabs-nb { border-bottom: 2px solid #e5e7eb; padding-bottom: 0; }
    .nav-tabs-nb .nav-link { color: #6b7280; border: none; border-bottom: 2px solid transparent;
                              border-radius: 0; padding: .65rem 1.1rem; margin-bottom: -2px; }
    .nav-tabs-nb .nav-link.active { color: var(--nb-azul); border-bottom-color: var(--nb-azul);
                                     font-weight: 600; background: transparent; }
    .nav-tabs-nb .nav-link:hover:not(.active) { color: var(--nb-azul-claro); background: var(--nb-azul-bg); border-radius: 8px 8px 0 0; }

    /* ===== BADGES ===== */
    .badge-status { font-size: .78rem; padding: .35em .7em; border-radius: 8px; font-weight: 500; }

    /* ===== FORMULÁRIOS ===== */
    .form-control-nb { border: 1px solid var(--nb-borda); border-radius: 10px; }
    .form-control-nb:focus { border-color: var(--nb-azul-claro); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }

    /* ===== BOTÕES ===== */
    .btn-nb-primary { background: var(--nb-azul); color: #fff; border-radius: 10px;
                      padding: .6rem 1.2rem; border: none; cursor: pointer; font-weight: 500; }
    .btn-nb-primary:hover { background: #1d3a9e; color: #fff; }

    /* ===== PERFIL DO ACOLHIDO ===== */
    .avatar-acolhido { width: 72px; height: 72px; background: var(--nb-azul-bg);
                       border: 3px solid var(--nb-borda); border-radius: 50%;
                       display: flex; align-items: center; justify-content: center;
                       font-size: 2rem; flex-shrink: 0; }

    /* ===== PROGRESSO ===== */
    .progresso-barra { height: 8px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .progresso-fill  { height: 100%; background: var(--nb-azul-claro); border-radius: 99px;
                       transition: width .4s; }

    /* ===== AGENDA / HORÁRIOS ===== */
    .agenda-data  { font-size: .7rem; font-weight: 700; text-transform: uppercase;
                    letter-spacing: .05em; color: var(--nb-azul); }
    .hora-bloco   { background: var(--nb-azul-bg); border-left: 3px solid var(--nb-azul-claro);
                    border-radius: 0 8px 8px 0; padding: .5rem .75rem; margin-bottom: .5rem; }

    /* ===== LOGIN ===== */
    #tela-login { min-height: 100vh; background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
                  display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px;
                  box-shadow: 0 20px 60px rgba(0,0,0,.15); }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 768px) {
      :root { --sidebar-w: 100%; }
      #layout-principal { flex-direction: column; height: auto; }
      #sidebar-wrapper  { width: 100%; min-width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e5e7eb; }
      #conteudo-principal { height: auto; }
    }
  </style>

    function bindLogin() {

          APP.logado = true; APP.userRole = found.role; APP.userName = found.nome;
          APP.needsPasswordChange = !!found.senhapadrao;
          renderApp();
        } else {
          const el = document.getElementById('login-erro');
          el.textContent = 'Usuário ou senha incorretos.'; el.classList.remove('d-none');
        }
      };
      document.getElementById('btn-entrar')?.addEventListener('click', entrar);
      document.getElementById('inp-pass')?.addEventListener('keydown', e => { if(e.key==='Enter') entrar(); });
    }

        if (n.length < 6) { err.textContent='Mínimo 6 caracteres.'; err.classList.remove('d-none'); return; }
        if (n !== c)      { err.textContent='As senhas não coincidem.'; err.classList.remove('d-none'); return; }
        APP.needsPasswordChange = false;
        renderApp();
      });
    }

        document.getElementById('form-novo-acolhido')?.classList.add('d-none');

        btn.addEventListener('click', () => navegar('perfil', { acolhidoId: parseInt(btn.dataset.id) }));

      const filtrar = () => {
        const busca   = document.getElementById('busca-acolhido').value.toLowerCase();
        const tipo    = document.getElementById('filtro-tipo').value;
        const status  = document.getElementById('filtro-status').value;
        const filtrado = ACOLHIDOS.filter(a =>
          (!busca   || a.nome.toLowerCase().includes(busca)) &&
          (!tipo    || a.tipo === tipo) &&
          (!status  || a.status === status)

        document.getElementById('lista-acolhidos').innerHTML = filtrado.length
          ? filtrado.map(a=>`

        case 'prescricoes': return renderAbaPrescricoes();
        case 'notas':       return renderAbaNotas();
        case 'piaPts':      return renderAbaPiaPts();
        case 'familia':     return renderAbaFamilia();
        case 'alta':        return renderAbaAlta();
        case 'documentos':  return renderAbaDocumentos();
        case 'gastos':      return renderAbaGastosAcolhido();
        case 'prestacao':   return renderAbaPrestacaoAcolhido();
        case 'recursos':    return renderAbaRecursosAcolhido();
        default:            return renderAbaPrescricoes();
      }
    }

    function bindPerfilAcolhido() {
      document.getElementById('btn-voltar-lista')?.addEventListener('click', () => {
        APP.acolhidoSelecionado = null;

        btn.addEventListener('click', () => {
          APP.abaPerfilAtiva = btn.dataset.aba;

          bindAbaAtual();

      ${familiar ? `

              <div class="col-md-6"><strong>Frequência:</strong> ${familiar.frequencia}</div>
            </div>
          </div>
        </div>
      </div>` : ''}

      <h6 class="mb-3">📅 Registro de Visitas</h6>
      <div class="card-nb">${visitasHtml}</div>`;

    function bindAbaFamilia() {
      document.getElementById('btn-add-familiar')?.addEventListener('click', () => {
        document.getElementById('form-familiar')?.classList.toggle('d-none');

      document.getElementById('btn-cancel-familiar')?.addEventListener('click', () => {
        document.getElementById('form-familiar')?.classList.add('d-none');
      });
      document.getElementById('btn-salvar-familiar')?.addEventListener('click', () => {
        const nome   = document.getElementById('fam-nome').value.trim();
        const parent = document.getElementById('fam-parent').value.trim();
        const tel    = document.getElementById('fam-tel').value.trim();
        const email  = document.getElementById('fam-email').value.trim();
        if (!nome) { alert('Informe o nome do familiar.'); return; }
        APP.familiares.push({ id: Date.now(), acolhidoId:1, nome, parentesco:parent||'—',
          telefone:tel||'—', email:email||'—', responsavelLegal:false, autorizadoVisita:true,
          ultimaVisita:'—', frequencia:'—' });
        document.getElementById('conteudo-aba').innerHTML = renderAbaPerfilAtual();
        bindAbaAtual();
      });

      // Sub-tabs PIA/PTS (quando aplicável)
      document.querySelectorAll('.sub-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          APP.abaPiaPtsAtiva = btn.dataset.sub;
          document.getElementById('sub-conteudo').innerHTML = APP.abaPiaPtsAtiva === 'pia' ? renderPIA() : renderPTS();
          document.querySelectorAll('.sub-tab-btn').forEach(b => {
            b.className = `btn ${b.dataset.sub === APP.abaPiaPtsAtiva ? 'btn-primary' : 'btn-outline-primary'} rounded-3 sub-tab-btn`;
          });
        });
      });

    function renderAbaDocumentos() {
      const docs = APP.documentos;
      const itens = docs.length === 0
        ? '<p class="text-muted text-center py-4">Nenhum documento enviado.</p>'
        : docs.map(d=>`
        <div class="d-flex align-items-center gap-3 py-3 border-bottom">
          <div style="width:44px;height:44px;background:#eff6ff;border-radius:10px;display:flex;align-items:center;justify-content:center;">📊</div>
          <div class="flex-grow-1">
            <div class="fw-medium small">${d.nome}</div>

          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary rounded-2">👁</button>
            <button class="btn btn-sm btn-outline-success rounded-2">⬇</button>
            <button class="btn btn-sm btn-outline-danger rounded-2 btn-del-doc" data-id="${d.id}">🗑</button>
          </div>
        </div>`).join('');

      return `

        <h5>📁 Documentos</h5>

      <div class="card-nb p-4 mb-3" style="background:#eff6ff;border-color:#bfdbfe;">

        <label for="inp-doc" class="btn btn-primary w-100 py-3 rounded-3" style="cursor:pointer;">⬆️ Fazer Upload de Documento</label>
      </div>
      <div class="card-nb p-3">${itens}</div>`;

    function bindAbaDocumentos() {
      document.getElementById('inp-doc')?.addEventListener('change', function() {
        if (this.files.length) {
          const f = this.files[0];
          APP.documentos.push({ id:Date.now(), nome:f.name, tipo:'Documento', dataUpload:new Date().toLocaleDateString('pt-BR'), tamanho:`${Math.round(f.size/1024)} KB` });
          document.getElementById('conteudo-aba').innerHTML = renderAbaPerfilAtual();
          bindAbaAtual();
        }
      });
      document.querySelectorAll('.btn-del-doc').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Excluir este documento?')) {
            APP.documentos = APP.documentos.filter(d => d.id !== parseInt(btn.dataset.id));
            document.getElementById('conteudo-aba').innerHTML = renderAbaPerfilAtual();
            bindAbaAtual();
          }
        });
      });
    }

          </div>
          <span class="fw-semibold">${formatBRL(g.valor)}</span>
        </div>
      </div>`).join('')}
      ${gastos.length === 0 ? '<p class="text-muted">Nenhum gasto registrado.</p>' : `<div class="fw-bold text-end">Total: ${formatBRL(total)}</div>`}`;
    }

      const aba  = APP.abaFinanceiroAtiva;

        {id:'documentos', label:'📁 Documentos'},

      switch (APP.abaFinanceiroAtiva) {

        case 'recursos':   return renderAbaRecursos();
        default:           return renderAbaDocumentosOrg();
      }

      document.querySelectorAll('.aba-financeiro-btn').forEach(btn => {

        <button class="btn btn-primary rounded-3" id="btn-reg-gasto">➕ Registrar Gasto</button>
      </div>
      <div id="form-novo-gasto" class="card-nb p-4 mb-4 d-none" style="background:#eff6ff;">
        <h6 class="mb-3">Registrar Novo Gasto</h6>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Acolhido</label>
            <select class="form-select form-control-nb">${ACOLHIDOS.map(a=>`<option>${a.nome}</option>`).join('')}</select></div>
          <div class="col-md-6"><label class="form-label">Descrição</label>
            <input type="text" class="form-control form-control-nb" placeholder="Ex: Medicamentos"></div>
          <div class="col-md-4"><label class="form-label">Valor (R$)</label>
            <input type="number" step="0.01" class="form-control form-control-nb"></div>
          <div class="col-md-4"><label class="form-label">Data</label>
            <input type="date" class="form-control form-control-nb"></div>
          <div class="col-md-4"><label class="form-label">Categoria</label>
            <select class="form-select form-control-nb">
              <option>Saúde - Medicamentos</option><option>Alimentação</option><option>Higiene</option><option>Outros</option>
            </select></div>
          <div class="col-12"><label class="form-label">Fornecedor</label>
            <input type="text" class="form-control form-control-nb"></div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-success rounded-3" onclick="alert('✅ Gasto registrado!')">✓ Salvar</button>
          <button class="btn btn-secondary rounded-3" id="btn-cancelar-gasto">Cancelar</button>
        </div>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="card-nb p-3 text-center" style="background:#eff6ff;border-color:#bfdbfe;">
          <div class="text-primary small">Total</div><div class="fw-bold fs-5">${formatBRL(total)}</div></div></div>
        <div class="col-md-4"><div class="card-nb p-3 text-center" style="background:#f0fdf4;border-color:#bbf7d0;">
          <div class="text-success small">Recursos Recebidos</div><div class="fw-bold fs-5">R$ 2.500,00</div></div></div>
        <div class="col-md-4"><div class="card-nb p-3 text-center" style="background:#faf5ff;border-color:#e9d5ff;">
          <div class="text-muted small">Saldo</div><div class="fw-bold fs-5 ${saldo>=0?'text-success':'text-danger'}">${formatBRL(saldo)}</div></div></div>
      </div>
      ${GASTOS.map(g=>`
      <div class="card-nb p-4 mb-3">
        <div class="d-flex justify-content-between align-items-start mb-2 flex-wrap gap-2">
          <div><h6 class="mb-1">${g.descricao}</h6>
            <div class="text-muted small">Acolhido: ${g.acolhido}</div>
          </div>
          <span class="fw-semibold fs-5">${formatBRL(g.valor)}</span>
        </div>
        <div class="row g-2 text-muted small">
          <div class="col-md-4"><strong class="text-dark">Data:</strong> ${g.data}</div>
          <div class="col-md-4"><strong class="text-dark">Categoria:</strong> ${g.categoria}</div>
          <div class="col-md-4"><strong class="text-dark">Fornecedor:</strong> ${g.fornecedor}</div>
        </div>
      </div>`).join('')}`;
    }

    function renderAbaPrestacao() {
      return `
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h5>📊 Prestação de Contas</h5>
        <button class="btn btn-primary rounded-3">➕ Novo Relatório</button>
      </div>
      ${PRESTACAO_CONTAS.map(p=>`
      <div class="card-nb p-4 mb-3">
        <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
          <h6 class="mb-0">${p.mes}</h6>
          <span class="badge ${statusBadge(p.status)} badge-status">${p.status === 'Aprovado' ? '✓' : '⏳'} ${p.status}</span>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4"><div class="text-muted small">Total de Gastos</div><div class="fw-medium">${formatBRL(p.totalGastos)}</div></div>
          <div class="col-md-4"><div class="text-muted small">Recursos Recebidos</div><div class="fw-medium">${formatBRL(p.recursosRecebidos)}</div></div>
          <div class="col-md-4"><div class="text-muted small">Saldo</div><div class="fw-medium text-success">${formatBRL(p.saldo)}</div></div>
        </div>
        <button class="btn btn-primary btn-sm rounded-3">📥 Baixar Relatório</button>
      </div>`).join('')}`;
    }

    function renderAbaRecursos() {
      const recursos = RECURSOS_ADMIN.map(r=>`
        <div class="d-flex justify-content-between align-items-center p-3 border-bottom flex-wrap gap-2">
          <div><div class="fw-medium">${r.nome}</div>
            <div class="text-muted small">${r.tipo} · Validade: ${r.validade}</div>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <span class="badge ${statusBadge(r.status)} badge-status">${r.status}</span>
            <button class="btn btn-link btn-sm">Ver</button>
          </div>
        </div>`).join('');
      const beneficios = BENEFICIOS.map(b=>`
        <div class="d-flex justify-content-between align-items-center p-3 border-bottom flex-wrap gap-2">
          <div><div class="fw-medium">${b.acolhido}</div>
            <div class="text-muted small">${b.beneficio}</div>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <span class="fw-medium">${formatBRL(b.valor)}/mês</span>
            <span class="badge bg-success badge-status">${b.status}</span>
          </div>
        </div>`).join('');
      return `
      <h5 class="mb-4">🏛️ Recursos Administrativos</h5>
      <div class="card-nb mb-4">
        <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-light">
          <h6 class="mb-0">Documentação Institucional</h6>
          <button class="btn btn-primary btn-sm rounded-3">➕ Adicionar Documento</button>
        </div>
        <div>${recursos}</div>
      </div>
      <div class="card-nb">
        <div class="p-3 border-bottom bg-light"><h6 class="mb-0">Benefícios e Auxílios dos Acolhidos</h6></div>
        <div>${beneficios}</div>
      </div>`;
    }

    document.addEventListener('click', function(e) {
      if (e.target.id === 'btn-reg-gasto') document.getElementById('form-novo-gasto')?.classList.toggle('d-none');
      if (e.target.id === 'btn-cancelar-gasto') document.getElementById('form-novo-gasto')?.classList.add('d-none');
    });

    // ============================================================
    // USUÁRIOS
    // ============================================================
    function renderUsuarios() {
      const lista = APP.usuarios.map(u=>`
        <div class="d-flex align-items-center gap-4 py-4 border-bottom flex-wrap">
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-3 mb-1 flex-wrap">
              <span class="fw-semibold fs-5">${u.nome}</span>
              <span class="badge ${badgeCargo(u.cargo)} badge-status">${nomeCargo(u.cargo)}</span>
            </div>
            <div class="text-muted small">Cadastrado em: ${u.criadoEm}</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary rounded-3 btn-editar-usuario" data-id="${u.id}" title="Editar">✏️</button>
            <button class="btn btn-danger rounded-3 btn-remover-usuario" data-id="${u.id}" title="Remover">🗑</button>
          </div>
        </div>`).join('');
      return `
      <div class="p-4">
        <h4 class="text-primary mb-1">⚙️ Gerenciar Usuários</h4>
        <p class="text-muted mb-4">Cadastre, edite ou remova usuários do sistema</p>
        <div class="mb-4">
          <button class="btn btn-primary rounded-3 px-4 py-3" id="btn-add-usuario">➕ Adicionar Novo Usuário</button>
        </div>
        <div id="form-novo-usuario" class="card-nb p-4 mb-4 d-none">
          <h6 class="mb-4">Novo Usuário</h6>
          <div class="mb-4"><label class="form-label">Nome Completo</label>
            <input type="text" id="nu-nome" class="form-control form-control-nb" placeholder="Nome completo"></div>
          <div class="mb-4"><label class="form-label">Cargo</label>
            <div class="row g-3" id="nu-cargo-grid">
              ${[{id:'admin',nome:'Administrador',icone:'👑'},{id:'technical',nome:'Equipe Técnica',icone:'🩺'},
                {id:'financial',nome:'Adm. Financeiro',icone:'💰'},{id:'staff',nome:'Funcionário',icone:'👤'},
                ].map(r=>`
              <div class="col-6 col-md-3">
                <button type="button" class="btn border w-100 p-3 rounded-3 cargo-btn ${r.id==='staff'?'border-primary bg-primary bg-opacity-10':''}" data-cargo="${r.id}">
                  <div class="fs-3 mb-1">${r.icone}</div>
                  <div class="small">${r.nome}</div>
                </button>
              </div>`).join('')}
            </div>
            <input type="hidden" id="nu-cargo" value="staff">
          </div>
          <div class="mb-4"><label class="form-label">Senha Inicial</label>
            <input type="text" id="nu-senha" class="form-control form-control-nb" value="senha123"></div>
          <div class="d-flex gap-3">
            <button class="btn btn-success flex-grow-1 rounded-3 py-3" id="btn-salvar-usuario">✓ Salvar Usuário</button>
            <button class="btn btn-secondary flex-grow-1 rounded-3 py-3" id="btn-cancelar-usuario">✕ Cancelar</button>
          </div>
        </div>
        <div class="card-nb">
          <div class="p-4 border-bottom" style="background:#eff6ff;">
            <h6 class="mb-0">Usuários Cadastrados (${APP.usuarios.length})</h6>
          </div>
          <div class="px-4" id="lista-usuarios">${lista}</div>
        </div>
      </div>`;
    }

    function bindUsuarios() {
      const btnAdd    = document.getElementById('btn-add-usuario');
      const formDiv   = document.getElementById('form-novo-usuario');
      const btnSalvar = document.getElementById('btn-salvar-usuario');
      const btnCancel = document.getElementById('btn-cancelar-usuario');
      const inpCargo  = document.getElementById('nu-cargo');

      btnAdd?.addEventListener('click', () => {
        formDiv?.classList.toggle('d-none');
        btnAdd.textContent = formDiv?.classList.contains('d-none') ? '➕ Adicionar Novo Usuário' : '✕ Fechar';
      });
      btnCancel?.addEventListener('click', () => {
        formDiv?.classList.add('d-none');
        btnAdd.textContent = '➕ Adicionar Novo Usuário';
        document.getElementById('nu-nome').value = '';
      });
      document.querySelectorAll('.cargo-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.cargo-btn').forEach(b => b.classList.remove('border-primary','bg-primary','bg-opacity-10'));
          btn.classList.add('border-primary','bg-primary','bg-opacity-10');
          inpCargo.value = btn.dataset.cargo;
        });
      });
      btnSalvar?.addEventListener('click', () => {
        const nome  = document.getElementById('nu-nome').value.trim();
        const cargo = inpCargo.value;
        if (!nome) { alert('Informe o nome do usuário.'); return; }
        const novo = { id:Date.now(), nome, cargo, criadoEm: new Date().toLocaleDateString('pt-BR') };
        APP.usuarios.push(novo);
        alert(`✅ Usuário "${nome}" (${nomeCargo(cargo)}) cadastrado!`);
        formDiv?.classList.add('d-none');
        btnAdd.textContent = '➕ Adicionar Novo Usuário';
        document.getElementById('nu-nome').value = '';
        document.getElementById('lista-usuarios').innerHTML = renderListaUsuarios();
        bindBotoesUsuarios();
      });
      bindBotoesUsuarios();
    }

    function renderListaUsuarios() {
      return APP.usuarios.map(u=>`
        <div class="d-flex align-items-center gap-4 py-4 border-bottom flex-wrap">
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-3 mb-1 flex-wrap">
              <span class="fw-semibold fs-5">${u.nome}</span>
              <span class="badge ${badgeCargo(u.cargo)} badge-status">${nomeCargo(u.cargo)}</span>
            </div>
            <div class="text-muted small">Cadastrado em: ${u.criadoEm}</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary rounded-3 btn-editar-usuario" data-id="${u.id}" title="Editar">✏️</button>
            <button class="btn btn-danger rounded-3 btn-remover-usuario" data-id="${u.id}" title="Remover">🗑</button>
          </div>
        </div>`).join('');
    }

    function bindBotoesUsuarios() {
      document.querySelectorAll('.btn-editar-usuario').forEach(btn => {
        btn.addEventListener('click', () => {
          const u = APP.usuarios.find(x => x.id === parseInt(btn.dataset.id));
          if (u) alert(`✏️ Editar: ${u.nome}\n\nEm produção: abre formulário de edição.`);
        });
      });
      document.querySelectorAll('.btn-remover-usuario').forEach(btn => {
        btn.addEventListener('click', () => {
          const u = APP.usuarios.find(x => x.id === parseInt(btn.dataset.id));
          if (!u) return;
          if (confirm(`Remover "${u.nome}"?`)) {
            APP.usuarios = APP.usuarios.filter(x => x.id !== parseInt(btn.dataset.id));
            document.getElementById('lista-usuarios').innerHTML = renderListaUsuarios();
            bindBotoesUsuarios();
          }
        });
      });
    }

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => { renderApp(); });
  </script>
</body>
</html>
